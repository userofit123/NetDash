services:
  netdash:
    build: .
    container_name: netdash
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - ./data:/app/data

  # Optional: enable this block if you want automatic HTTPS via Caddy.
  # Comment out netdash.network_mode above and uncomment below:
