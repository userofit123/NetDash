<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <!-- Globe circle -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="url(#b)" stroke-width="2"/>
  <!-- Latitude lines -->
  <ellipse cx="16" cy="16" rx="13" ry="4" fill="none" stroke="url(#b)" stroke-width="1.2" opacity="0.7"/>
  <ellipse cx="16" cy="16" rx="13" ry="8" fill="none" stroke="url(#b)" stroke-width="0.8" opacity="0.4"/>
  <!-- Longitude lines -->
  <ellipse cx="16" cy="16" rx="4" ry="13" fill="none" stroke="url(#b)" stroke-width="1.2" opacity="0.7"/>
  <ellipse cx="16" cy="16" rx="8" ry="13" fill="none" stroke="url(#b)" stroke-width="0.8" opacity="0.4"/>
  <!-- Center core -->
  <circle cx="16" cy="16" r="2.5" fill="url(#b)"/>
  <!-- Orbital ring (diagnostic sweep) -->
  <path d="M 5 16 A 11 11 0 0 1 27 16" fill="none" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round"/>
</svg>
